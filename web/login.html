<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>Diartrip - Login</title>
    <link rel="shortcut icon" href="imagens/favicon-diartrip.png" type="image/x-icon">
    <script src="static/i18n.js"></script>
</head>
<body>
    <header>
        <a href="index.html"><div class="logo"><img src="imagens/logo-diartrip.png" alt=""></div></a>
    </header>
    <section style="padding:100px 20px; max-width:600px; max-height: 550px; margin:auto; position: relative; bottom: 70px;">
        <h2 class="section-title titulo" style="margin-bottom:20px;" data-i18n="login.title">Login</h2>
        <form id="signupForm" style="display:flex; flex-direction:column; gap:22px; background:rgba(255,255,255,0.05); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(6px); position:relative;">

            <div class="field">
                <label data-i18n="login.email.label">Email</label>
                <input id="email" type="email" data-i18n-placeholder="login.email.placeholder" placeholder="Enter your email" required>
            </div>

            <div class="field" style="position:relative">
                <label data-i18n="login.pass.label">Password</label>
                <input id="password" type="password" data-i18n-placeholder="login.pass.placeholder" placeholder="Enter your password" required>
                <span class="togglePassword" style="position:absolute; right:12px; top:45px; cursor:pointer; font-size:14px; color:#94a3b8;" data-i18n="login.pass.show">show</span>
            </div>

            <span class="error" id="submitError" style="display: none;" data-i18n="login.error">Could not log in, please try again.</span>

            <button class="cta" id="submit" type="submit" data-i18n="login.submit">Sign In</button>

            <div class="login"><a href="form.html" data-i18n="login.noAccount">Don't have an account? Click here.</a></div>

        </form>
    </section>
    <footer data-i18n="footer">
    © 2026 Diartrip — Intelligent Travel Planning
    </footer>

    <script>
        const togglePassword = document.querySelector(".togglePassword")
        const emailInput = document.getElementById("email")
        const passwordInput = document.getElementById("password")
        const submitBtn = document.querySelector("#submit")
        const submitError = document.querySelector("#submitError")

        togglePassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text"
                togglePassword.textContent = t("login.pass.hide")
            } else {
                passwordInput.type = "password"
                togglePassword.textContent = t("login.pass.show")
            }
        })

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault()
            submitError.style.display = "none"

            if (!emailInput.value || !passwordInput.value) return

            submitBtn.disabled = true
            submitBtn.textContent = t("login.signingIn")

            try {
                const resp = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({
                        email: emailInput.value,
                        senha: passwordInput.value
                    })
                })

                if (resp.ok) {
                    const respJson = await resp.json()
                    sessionStorage.setItem("id", respJson.usuario_id)
                    sessionStorage.setItem("logado", "1")
                    window.location.href = "lobby.html"
                } else {
                    submitError.style.display = "block"
                }
            } catch (err) {
                submitError.textContent = t("login.error")
                submitError.style.display = "block"
            } finally {
                submitBtn.disabled = false
                submitBtn.textContent = t("login.submit")
            }
        })
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

</body>
</html>
