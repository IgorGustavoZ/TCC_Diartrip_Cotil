server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Segurança básica ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip ──────────────────────────────────────────────────────────────────
    # Comprime JS, WASM, CSS e JSON antes de enviar ao browser.
    # O Flutter web gera arquivos grandes (canvaskit.wasm ~2MB) — gzip reduz ~70%.
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # Flutter web usa o History API do browser para navegação.
    # Sem este bloco, atualizar a página em /grupos/123 resultaria em 404 do nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache: index.html (nunca cachear) ─────────────────────────────────────
    # Garante que o browser sempre busca a versão mais recente do app.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Cache: assets estáticos (1 ano) ───────────────────────────────────────
    # Flutter gera nomes com hash (main.dart.js?v=abc123), então cache longo é seguro.
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # ── Ocultar versão do nginx (segurança) ───────────────────────────────────
    server_tokens off;
}
