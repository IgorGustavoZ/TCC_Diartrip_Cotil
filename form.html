<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Diartrip - Cadastro</title>
    <link rel="shortcut icon" href="imagens/favicon-diartrip.png" type="image/x-icon">
</head>
<body>
    <header>
        <a href="index.html"><div class="logo"><img src="imagens/logo-diartrip.png" alt=""></div></a>
    </header>
    <section style="padding:100px 20px; max-width:600px; margin:auto; position: relative; bottom: 100px;">
        <h2 class="section-title titulo" style="margin-bottom:20px;">Cadastro</h2>
        <form id="signupForm" style="display:flex; flex-direction:column; gap:22px; background:rgba(255,255,255,0.05); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(6px); position:relative;">

        <div class="field">
        <label>Nome</label>
        <input id="name" type="text" placeholder="Digite seu nome" required>
        <span class="error" id="nameError"></span>
        </div>

        <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="Digite seu email" required>
        <span class="error" id="emailError"></span>
        </div>

        <div class="field" style="position:relative">
        <label>Senha</label>
        <input id="password" type="password" placeholder="Crie uma senha" required>
        <span id="togglePassword" style="position:absolute; right:12px; top:45px; cursor:pointer; font-size:14px; color:#94a3b8;">mostrar</span>
        <span class="error" id="passwordError"></span>
        </div>
        <input class="cta" id="submit" type="submit" value="Criar conta">
        <div class="login"><a href="login.html">Já tem uma conta? Clique aqui.</a></div>
        
    </form>
    
    <footer>
    © 2026 Diartrip — Planejamento Inteligente de Viagens
    </footer>
<script>
    const form = document.getElementById("signupForm")
    const nameInput = document.getElementById("name")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const togglePassword = document.getElementById("togglePassword")

    const nameError = document.getElementById("nameError")
    const emailError = document.getElementById("emailError")
    const passwordError = document.getElementById("passwordError")
    const submitBtn = document.getElementById("submit")

    togglePassword.addEventListener("click", () => {
        if (passwordInput.type === "password") {
            passwordInput.type = "text"
            togglePassword.textContent = "ocultar"
        } else {
            passwordInput.type = "password"
            togglePassword.textContent = "mostrar"
        }
    })

    form.addEventListener("submit", async function(e) {
        e.preventDefault()

        nameError.textContent = ""
        emailError.textContent = ""
        passwordError.textContent = ""

        let valid = true

        if (nameInput.value.trim().length < 3) {
            nameError.textContent = "Nome deve ter pelo menos 3 caracteres"
            valid = false
        }

        if (!emailInput.value.includes("@")) {
            emailError.textContent = "Email inválido"
            valid = false
        }

        if (passwordInput.value.length < 6) {
            passwordError.textContent = "Senha deve ter no mínimo 6 caracteres"
            valid = false
        }

        if (!valid) return

        const nome = nameInput.value.trim()
        const email = emailInput.value.trim()
        const senha = passwordInput.value

        submitBtn.disabled = true
        submitBtn.value = "Criando..."

        try {
            const resp = await fetch("http://127.0.0.1:8000/usuarios", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome, email, senha })
            })

            if (resp.status === 409) {
                emailError.textContent = "Este email já está cadastrado."
                return
            }

            if (!resp.ok) {
                const dados = await resp.json()
                emailError.textContent = dados.detail || "Erro ao criar conta. Tente novamente."
                return
            }

            const respLogin = await fetch("http://127.0.0.1:8000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, senha })
            })

            if (!respLogin.ok) {
                nameError.textContent = "Conta criada, mas não foi possível fazer login automático."
                return
            }

            const respJson = await respLogin.json()
            sessionStorage.setItem("token", respJson.token)
            sessionStorage.setItem("id", respJson.usuario_id)
            window.location.href = "lobby.html"

        } catch (err) {
            emailError.textContent = "Não foi possível conectar ao servidor."
        } finally {
            submitBtn.disabled = false
            submitBtn.value = "Criar conta"
        }
    })
</script>
</body>
</html>
