name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — pytest + cobertura
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python / pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-diartrip-2026
      ALGORITHM: HS256
      DB_HOST: localhost
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: diartrip_test
      OPENROUTER_API_KEY: test-key
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-api-key
      CLOUDINARY_API_SECRET: test-api-secret
      REDIS_URL: ""           # força fallback em memória (igual ao conftest.py)

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Flutter — analyze + unit/widget tests + cobertura
  # ──────────────────────────────────────────────────────────────────────────
  flutter:
    name: Flutter (unit + widget tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: diartrip_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (lint)
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests with coverage
        run: |
          flutter test \
            test/unit \
            test/widget \
            --coverage \
            --reporter expanded

      - name: Check coverage threshold (80 %)
        run: |
          pip install lcov_cobertura
          python -c "
          import subprocess, sys
          result = subprocess.run(['lcov', '--summary', 'coverage/lcov.info'], capture_output=True, text=True)
          print(result.stdout)
          for line in result.stdout.splitlines():
              if 'lines' in line.lower():
                  pct = float(line.split(':')[1].strip().rstrip('%').split()[0])
                  if pct < 80:
                      print(f'Coverage {pct:.1f}% < 80% threshold')
                      sys.exit(1)
                  print(f'Coverage OK: {pct:.1f}%')
          "
        continue-on-error: true

      - name: Convert LCOV to Cobertura XML
        run: |
          pip install lcov_cobertura
          python -m lcov_cobertura coverage/lcov.info --output coverage.xml
        continue-on-error: true

      - name: Upload Flutter coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: diartrip_flutter/coverage.xml
          flags: flutter
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Flutter Web — testes no Chrome (sem integration_test, apenas unit+widget)
  # ──────────────────────────────────────────────────────────────────────────
  flutter-web:
    name: Flutter Web (Chrome)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: diartrip_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests on Chrome
        run: |
          flutter test \
            test/unit \
            test/widget \
            --platform chrome \
            --reporter expanded

  # ──────────────────────────────────────────────────────────────────────────
  # Flutter Windows — testes na plataforma Windows
  # ──────────────────────────────────────────────────────────────────────────
  flutter-windows:
    name: Flutter Windows
    runs-on: windows-latest

    defaults:
      run:
        working-directory: diartrip_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit & widget tests
        run: |
          flutter test test/unit test/widget --reporter expanded

  # ──────────────────────────────────────────────────────────────────────────
  # Docker — valida que o build do backend não quebra
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: diartrip-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Status summary — falha se qualquer job falhar
  # ──────────────────────────────────────────────────────────────────────────
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, flutter, flutter-web, flutter-windows, docker-build]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || \
                "${{ needs.flutter.result }}" != "success" || \
                "${{ needs.flutter-web.result }}" != "success" || \
                "${{ needs.flutter-windows.result }}" != "success" || \
                "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
