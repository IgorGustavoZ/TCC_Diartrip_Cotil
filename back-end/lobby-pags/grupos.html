<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diartrip - Grupos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/style.css">
<link rel="shortcut icon" href="../imagens/favicon-diartrip.png" type="image/x-icon">
<script src="../static/i18n.js"></script>
<style>
.grupos-wrap { max-width: 720px; margin: 0 auto; padding: 0 16px 40px; }
.entrar-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
}
.entrar-card h3 { margin: 0 0 14px; font-size: 16px; color: #cbd5f5; }
.entrar-row { display: flex; gap: 10px; }
.entrar-row input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 14px;
    color: #f1f5f9;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    outline: none;
}
.entrar-row input::placeholder { text-transform: none; letter-spacing: 0; color: #64748b; }
.entrar-row input:focus { border-color: #3b82f6; }
.btn-entrar {
    background: linear-gradient(135deg,#3b82f6,#06b6d4);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
}
.btn-entrar:hover { opacity: 0.9; }
.msg-entrar { margin-top: 10px; font-size: 13px; display: none; }
.msg-entrar.ok { color: #4ade80; }
.msg-entrar.err { color: #f87171; }

.grupos-lista h3 { font-size: 15px; color: #94a3b8; margin: 0 0 14px; }
.grupo-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
}
.grupo-card:hover { border-color: rgba(59,130,246,0.4); }
.grupo-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg,#3b82f6,#06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
}
.grupo-info { flex: 1; min-width: 0; }
.grupo-nome { font-size: 15px; font-weight: 600; color: #f1f5f9; margin: 0 0 2px; }
.grupo-destino { font-size: 13px; color: #94a3b8; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grupo-acoes { display: flex; gap: 8px; flex-shrink: 0; }
.btn-viagem, .btn-chat {
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
}
.btn-viagem { background: rgba(255,255,255,0.08); color: #cbd5f5; }
.btn-chat { background: linear-gradient(135deg,#3b82f6,#06b6d4); color: #fff; }
.btn-viagem:hover, .btn-chat:hover { opacity: 0.85; }
.grupos-vazio { color: #64748b; font-size: 14px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="app">

    <div class="sidebar">
        <a href="../lobby.html">
            <div class="logo"><img src="../imagens/logo-diartrip.png" alt=""></div>
        </a>
        <a href="../lobby.html"><div class="menu-item" data-i18n="nav.myTrips">✈ My Trips</div></a>
        <a href="grupos.html"><div class="menu-item active" data-i18n="nav.groups">🌍 Groups</div></a>
        <a href="feed.html"><div class="menu-item" data-i18n="nav.feed">📰 Feed</div></a>
        <a href="perfil.html"><div class="menu-item" data-i18n="nav.profile">👤 Profile</div></a>
        <a href="form-viagem.html">
            <button class="new-trip" data-i18n="nav.newTrip">+ New Trip</button>
        </a>
    </div>

    <div class="main">
        <div class="header"><h2 data-i18n="grupos.header">Groups</h2></div>

        <div class="grupos-wrap">

            <!-- Entrar por código -->
            <div class="entrar-card">
                <h3 data-i18n="grupos.joinTitle">🔑 Join a group</h3>
                <div class="entrar-row">
                    <input id="codigoInput" maxlength="6" data-i18n-placeholder="grupos.joinPlaceholder" placeholder="Invite code (e.g. AB12CD)">
                    <button class="btn-entrar" onclick="entrarGrupo()" data-i18n="grupos.joinBtn">Join</button>
                </div>
                <div class="msg-entrar ok" id="msgOk"></div>
                <div class="msg-entrar err" id="msgErr"></div>
            </div>

            <!-- Lista de grupos -->
            <div class="grupos-lista">
                <h3 data-i18n="grupos.yourGroups">Your groups</h3>
                <div id="gruposLista"><p class="grupos-vazio" data-i18n="common.loading">Carregando...</p></div>
            </div>

        </div>
    </div>
</div>

<script>
if (!sessionStorage.getItem("logado")) window.location.href = "../login.html"

document.addEventListener('languageChanged', () => {
    applyTranslations()
    carregarGrupos()
})

async function carregarGrupos() {
    const resp = await fetch("/grupos", { credentials: "include" })
    if (!resp.ok) return
    const grupos = await resp.json()
    const lista = document.getElementById("gruposLista")

    if (grupos.length === 0) {
        lista.innerHTML = `<p class="grupos-vazio" data-i18n="grupos.empty">${t('grupos.empty')}</p>`
        return
    }

    lista.innerHTML = grupos.map(g => `
        <div class="grupo-card">
            <div class="grupo-icon">✈</div>
            <div class="grupo-info">
                <p class="grupo-nome">${escapeHtml(g.nome_grupo)}</p>
                <p class="grupo-destino">📍 ${escapeHtml(g.destino_principal || "")}${g.data_inicio ? " · " + g.data_inicio : ""}</p>
            </div>
            <div class="grupo-acoes">
                <button class="btn-viagem" onclick="irViagem(${g.id_grupo})">${t('grupos.viewTrip')}</button>
                <button class="btn-chat" onclick="irChat(${g.id_grupo})">${t('grupos.chat')}</button>
            </div>
        </div>
    `).join("")
}

function irViagem(id) { window.location.href = `viagem.html?id=${id}` }
function irChat(id) { window.location.href = `viagem.html?id=${id}&tab=chat` }

async function entrarGrupo() {
    const codigo = document.getElementById("codigoInput").value.trim().toUpperCase()
    const msgOk = document.getElementById("msgOk")
    const msgErr = document.getElementById("msgErr")
    msgOk.style.display = "none"
    msgErr.style.display = "none"

    if (codigo.length < 4) {
        msgErr.textContent = t('grupos.enterCodeError')
        msgErr.style.display = "block"
        return
    }

    const resp = await fetch("/grupos/entrar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ codigo_convite: codigo })
    })
    const data = await resp.json()

    if (resp.ok) {
        msgOk.textContent = data.mensagem + " ✓"
        msgOk.style.display = "block"
        document.getElementById("codigoInput").value = ""
        carregarGrupos()
    } else {
        msgErr.textContent = data.detail || t('grupos.joinError')
        msgErr.style.display = "block"
    }
}

document.getElementById("codigoInput").addEventListener("keydown", e => {
    if (e.key === "Enter") entrarGrupo()
})

function escapeHtml(txt) {
    return String(txt).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

carregarGrupos()
</script>
</body>
</html>
