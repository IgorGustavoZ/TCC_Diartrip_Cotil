<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diartrip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
<link rel="shortcut icon" href="imagens/favicon-diartrip.png" type="image/x-icon">
<script src="static/i18n.js"></script>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <div class="app">

    <div class="sidebar">

    <a href="#">
        <div class="logo"><img src="imagens/logo-diartrip.png" alt=""></div>
    </a>

    <div class="menu-item" data-i18n="nav.myTrips">✈ My Trips</div>
    <a href="lobby-pags/grupos.html">
        <div class="menu-item" data-i18n="nav.groups">🌍 Groups</div>
    </a>
    <a href="lobby-pags/feed.html">
        <div class="menu-item" data-i18n="nav.feed">📰 Feed</div>
    </a>
    <a href="lobby-pags/perfil.html">
        <div class="menu-item" data-i18n="nav.profile">👤 Profile</div>
    </a>

    <a href="lobby-pags/form-viagem.html">
        <button class="new-trip" data-i18n="nav.newTrip">+ New Trip</button>
    </a>

    </div>

    <div class="main">

    <div class="header">
    <h2 data-i18n="lobby.trips.heading">My Trips</h2>
    <a href="lobby-pags/perfil.html" id="userChip" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); padding:6px 14px 6px 6px; border-radius:50px; cursor:pointer; transition:background 0.2s; text-decoration:none; color:inherit;">
        <div id="avatarMini" style="width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#06b6d4); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0;">?</div>
        <span id="userNome" style="font-size:14px; color:#cbd5f5; white-space:nowrap;"></span>
    </a>
    </div>

    <div class="content">

    <div class="trips">
    <h3 data-i18n="lobby.trips.section">Your trips</h3>

    <div class="trip-grid">
    </div>

    </div>

    <div class="chat">

    <div class="chat-header" data-i18n="lobby.chat.header">Travel AI Assistant</div>

    <div id="chatMessages" class="chat-messages">
    <div class="message"><strong>AI:</strong> <span data-i18n="lobby.chat.initial">Hello! Select a trip and ask me anything about it.</span></div>
    </div>

    <div class="chat-input">
    <input id="chatInput" data-i18n-placeholder="lobby.chat.placeholder" placeholder="Ask something about your trip...">
    <button onclick="sendMessage()" data-i18n="lobby.chat.send">Send</button>
    </div>

    </div>

    </div>

    </div>

    </div>

<script>
    function escapeHtml(txt) {
        return String(txt).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    }

    let grupoSelecionado = null

    const txtBv = async () => {
        const resp = await fetch(`/usuarios/me`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        })

        if (resp.ok) {
            const dados = await resp.json()
            const avatarEl = document.getElementById("avatarMini")
            if (dados.foto_perfil) {
                avatarEl.innerHTML = `<img src="${dados.foto_perfil}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;display:block;">`
            } else {
                const iniciais = dados.nome.trim().split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase()
                avatarEl.textContent = iniciais
            }
            document.getElementById("userNome").textContent = `${t('lobby.greeting')}${dados.nome.split(" ")[0]}!`
        }
    }

    const carregarViagens = async () => {
        const resp = await fetch(`/grupos`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        })

        if (!resp.ok) return

        const viagens = await resp.json()
        const grid = document.querySelector(".trip-grid")
        grid.innerHTML = ""

        if (viagens.length === 0) {
            grid.innerHTML = `<p>${t('lobby.trips.empty') || 'No trips found.'}</p>`
            return
        }

        viagens.forEach(viagem => {

    const card = document.createElement("div")

    card.className = "trip-card"

    card.dataset.id = viagem.id_grupo

    card.innerHTML = `
        <strong>${escapeHtml(viagem.nome_grupo)}</strong>

        <div class="trip-date">
            ${escapeHtml(viagem.destino_principal || "")}
        </div>

        <div class="trip-date">
            ${escapeHtml(viagem.data_inicio || "")} — ${escapeHtml(viagem.data_fim || "")}
        </div>
    `

    card.addEventListener("click", () => {

        document
            .querySelectorAll(".trip-card")
            .forEach(c => c.classList.remove("ativo"))

        card.classList.add("ativo")

        grupoSelecionado = viagem.id_grupo

        const messages = document.getElementById("chatMessages")

        messages.innerHTML = `
            <div class="message">
                <strong>AI:</strong>
                <em>${escapeHtml(viagem.nome_grupo)}</em> ${t('lobby.chat.selected') || 'selected! How can I help?'}
            </div>
        `
    })

    card.addEventListener("dblclick", () => {

        window.location.href =
            `lobby-pags/viagem.html?id=${viagem.id_grupo}`

    })

    grid.appendChild(card)
})
    }

    async function sendMessage() {
        const input = document.getElementById("chatInput")
        const messages = document.getElementById("chatMessages")

        const text = input.value.trim()
        if (!text) return

        if (!grupoSelecionado) {
            const aviso = document.createElement("div")
            aviso.className = "message"
            aviso.innerHTML = `<strong>AI:</strong> ${t('lobby.chat.selectFirst') || 'Select a trip before sending a message.'}`
            messages.appendChild(aviso)
            messages.scrollTop = messages.scrollHeight
            return
        }

        const userMsg = document.createElement("div")
        userMsg.className = "message"
        userMsg.innerHTML = `<strong>${t('lobby.chat.you') || 'You'}:</strong> ${escapeHtml(text)}`
        messages.appendChild(userMsg)
        input.value = ""
        messages.scrollTop = messages.scrollHeight

        const loading = document.createElement("div")
        loading.className = "message"
        loading.id = "loading"
        loading.innerHTML = `<strong>AI:</strong> ${t('lobby.chat.typing') || 'typing...'}`
        messages.appendChild(loading)
        messages.scrollTop = messages.scrollHeight

        try {
            const resp = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({
                    pergunta: text,
                    id_grupo: grupoSelecionado
                })
            })

            document.getElementById("loading")?.remove()

            if (!resp.ok) {
                const erro = await resp.json()
                const errMsg = document.createElement("div")
                errMsg.className = "message"
                errMsg.innerHTML = `<strong>AI:</strong> ${t('lobby.chat.error') || 'Error getting response.'} (${escapeHtml(String(erro.detail || resp.status))})`
                messages.appendChild(errMsg)
            } else {
                const dados = await resp.json()
                const aiMsg = document.createElement("div")
                aiMsg.className = "message"
                aiMsg.innerHTML = `
    <strong>AI:</strong>
    <div class="ia-formatada">
        ${DOMPurify.sanitize(marked.parse(dados.resposta))}
    </div>
`
                messages.appendChild(aiMsg)
            }
        } catch (e) {
            document.getElementById("loading")?.remove()
            const errMsg = document.createElement("div")
            errMsg.className = "message"
            errMsg.innerHTML = `<strong>AI:</strong> ${t('lobby.chat.noServer') || 'Could not connect to server.'}`
            messages.appendChild(errMsg)
        }

        messages.scrollTop = messages.scrollHeight
    }

    document.getElementById("chatInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage()
    })

    txtBv()
    carregarViagens()
</script>

</body>
</html>
